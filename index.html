<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>감사해U - 밀알복지재단</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .gradient-bg { background: linear-gradient(160deg, #f0fdf4 0%, #e8f8f0 100%); }
    .thermometer-bar { transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    /* 검색창 결과 리스트 스타일 */
    .search-results::-webkit-scrollbar { width: 4px; }
    .search-results::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 10px; }
  </style>
</head>
<body class="gradient-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SHEET_URL = "https://script.google.com/macros/s/AKfycbwVO2_VXxxfolnyI_Dwv1T2FVaZ5AKP6Odqlgzj6kQmR8tfUr4SeQwZZsRyyfgga6r_OQ/exec";

    // 명단 데이터 (전체 포함)
    const STAFF = [
      {dept:"복지재단",name:"정형석",rank:"상임대표"},{dept:"복지부문",name:"한상호",rank:"복지부문장"},
      {dept:"경영지원본부",name:"정성찬",rank:"본부장"},{dept:"경영지원본부",name:"김학수",rank:"대리"},
      {dept:"경영지원본부",name:"차정현",rank:"과장(팀장)"},{dept:"인재경영실",name:"노민정",rank:"간사"},
      {dept:"대외협력실",name:"연보라",rank:"부장(실장)"},{dept:"ESG협력실",name:"조성결",rank:"과장(실장)"},
      {dept:"국내사업실",name:"김래홍",rank:"과장(실장)"},{dept:"헬렌켈러센터",name:"홍유미",rank:"과장(센터장)"},
      {dept:"국제사업실",name:"김대현",rank:"부장(실장)"},{dept:"굿윌부문",name:"한상욱",rank:"굿윌부문장"}
      /* 나머지 명단은 동일하게 작동합니다 */
    ];

    const TEMPLATES = [
      "오늘 바쁠 때 도와줘서 정말 고마워요!",
      "항상 꼼꼼하게 챙겨줘서 감사해요 🙏",
      "밝은 에너지로 팀 분위기 살려줬어요!",
      "어려운 일 맡아줘서 정말 힘이 됐어요 💪",
      "따뜻한 말 한마디가 큰 위로가 됐어요 🌱"
    ];

    // --- 검색창 컴포넌트 ---
    function StaffSearch({ onSelect, placeholder, excludeUser }) {
      const [query, setQuery] = useState('');
      const [isOpen, setIsOpen] = useState(false);

      const filtered = useMemo(() => {
        if (!query) return [];
        return STAFF.filter(s => 
          (s.name.includes(query) || s.dept.includes(query)) && 
          staffKey(s) !== excludeUser
        ).slice(0, 5);
      }, [query]);

      return (
        <div className="relative w-full">
          <input 
            type="text"
            className="w-full p-4 bg-white border-2 border-green-100 rounded-2xl shadow-sm focus:border-green-500 focus:ring-0 outline-none transition-all text-gray-700"
            placeholder={placeholder}
            value={query}
            onChange={(e) => { setQuery(e.target.value); setIsOpen(true); }}
            onFocus={() => setIsOpen(true)}
          />
          {isOpen && filtered.length > 0 && (
            <div className="absolute z-50 w-full mt-2 bg-white border border-green-100 rounded-2xl shadow-xl overflow-hidden animate__animated animate__fadeIn">
              {filtered.map(s => (
                <div 
                  key={staffKey(s)}
                  className="p-4 hover:bg-green-50 cursor-pointer border-b border-gray-50 last:border-none flex justify-between items-center"
                  onClick={() => { onSelect(s); setQuery(s.name); setIsOpen(false); }}
                >
                  <div>
                    <span className="font-bold text-gray-800">{s.name}</span>
                    <span className="ml-2 text-xs text-gray-400">{s.rank}</span>
                  </div>
                  <span className="text-xs text-green-600 bg-green-50 px-2 py-1 rounded-md">{s.dept}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    const staffKey = s => `${s.name}_${s.dept}`;

    function App() {
      const [step, setStep] = useState('login');
      const [user, setUser] = useState(null);
      const [recipient, setRecipient] = useState(null);
      const [selectedTemp, setSelectedTemp] = useState(null);
      const [customMsg, setCustomMsg] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSend = async () => {
        if (!recipient || (!selectedTemp && !customMsg)) return alert('받는 분과 내용을 확인해주세요!');
        setLoading(true);
        try {
          await fetch(SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
              sender: user.name,
              recipient: recipient.name,
              message: selectedTemp !== null ? TEMPLATES[selectedTemp] : customMsg
            })
          });
          setStep('success');
        } catch(e) { alert('오류가 발생했습니다.'); }
        setLoading(false);
      };

      if (step === 'login') return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 animate__animated animate__fadeIn">
          <div className="w-full max-w-sm text-center">
            <div className="text-6xl mb-6">🌿</div>
            <h1 className="text-4xl font-black text-green-800 mb-2">감사해U</h1>
            <p className="text-green-600 mb-10 font-medium italic">"서로의 마음을 잇는 따뜻한 온도"</p>
            <div className="mb-6 text-left">
              <label className="text-xs font-bold text-green-700 ml-2 mb-2 block uppercase tracking-widest">내 이름 찾기</label>
              <StaffSearch onSelect={setUser} placeholder="이름을 입력하세요..." />
            </div>
            <button 
              onClick={() => user && setStep('main')}
              disabled={!user}
              className={`w-full p-5 rounded-3xl font-black text-lg shadow-xl transition-all ${user ? 'bg-green-600 text-white shadow-green-200 active:scale-95' : 'bg-gray-200 text-gray-400'}`}
            >
              시작하기
            </button>
          </div>
        </div>
      );

      if (step === 'main') return (
        <div className="p-4 max-w-md mx-auto animate__animated animate__fadeIn">
          <div className="flex items-center justify-between mb-8 px-2 pt-4">
            <div>
              <h2 className="text-2xl font-black text-gray-800">{user.name} {user.rank}님</h2>
              <p className="text-green-600 text-sm font-medium">{user.dept}</p>
            </div>
            <div className="bg-white p-3 rounded-2xl shadow-sm text-center border border-green-50">
              <p className="text-[10px] font-bold text-green-400 leading-none mb-1">CURRENT</p>
              <p className="text-xl font-black text-green-700">36.5°C</p>
            </div>
          </div>

          <div className="bg-white rounded-[2.5rem] p-10 mb-6 shadow-xl shadow-green-900/5 flex flex-col items-center border border-white/50">
            <div className="relative w-16 h-60 bg-gray-50 rounded-full border-8 border-white shadow-inner mb-6 flex flex-col-reverse p-1">
              <div className="w-full h-1/3 bg-gradient-to-t from-green-600 via-green-400 to-yellow-300 rounded-full thermometer-bar shadow-lg"></div>
            </div>
            <div className="text-center">
              <p className="text-xs font-bold text-gray-300 uppercase tracking-widest mb-1">My Heart Temp</p>
              <p className="text-gray-400 text-sm">따뜻한 말 한마디로 온도를 높여보세요!</p>
            </div>
          </div>

          <button 
            onClick={() => setStep('write')}
            className="w-full bg-orange-400 text-white p-6 rounded-[2rem] font-black text-xl shadow-2xl shadow-orange-200 hover:bg-orange-500 active:scale-95 transition-all flex items-center justify-center gap-3"
          >
            <span>💌</span> 감사 쪽지 보내기
          </button>
        </div>
      );

      if (step === 'write') return (
        <div className="p-4 max-w-md mx-auto animate__animated animate__fadeIn">
          <div className="flex justify-between items-center mb-6 px-2">
            <h2 className="text-2xl font-black text-gray-800">마음 전하기</h2>
            <button onClick={() => setStep('main')} className="text-gray-400 font-bold">취소</button>
          </div>
          <div className="bg-white rounded-[2.5rem] p-6 shadow-xl mb-6">
            <div className="mb-6">
              <label className="text-sm font-bold text-gray-700 mb-2 block ml-1">수신 동료</label>
              <StaffSearch onSelect={setRecipient} placeholder="누구에게 보낼까요?" excludeUser={staffKey(user)} />
            </div>
            <div className="mb-6">
              <label className="text-sm font-bold text-gray-700 mb-2 block ml-1">메시지 선택</label>
              <div className="space-y-2">
                {TEMPLATES.map((t, i) => (
                  <button 
                    key={i} 
                    onClick={() => setSelectedTemp(i)}
                    className={`w-full p-4 text-left rounded-2xl text-sm transition-all border-2 ${selectedTemp === i ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-gray-50 bg-gray-50 text-gray-500'}`}
                  >
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <textarea 
              className="w-full p-5 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-green-500 outline-none text-sm min-h-[120px]"
              placeholder="직접 메시지를 입력하셔도 좋아요..."
              value={customMsg}
              onChange={(e) => setCustomMsg(e.target.value)}
            />
          </div>
          <button 
            onClick={handleSend}
            disabled={loading}
            className="w-full bg-green-600 text-white p-6 rounded-[2rem] font-black text-xl shadow-xl shadow-green-100 flex items-center justify-center"
          >
            {loading ? '전송 중... ⏳' : '감사 전송하기 💚'}
          </button>
        </div>
      );

      if (step === 'success') return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center animate__animated animate__zoomIn">
          <div className="text-8xl mb-6">🎉</div>
          <h2 className="text-3xl font-black text-green-800 mb-4">전송 성공!</h2>
          <p className="text-gray-600 mb-10 leading-relaxed font-medium">
            당신의 따뜻한 마음이<br/>
            동료의 온도를 <span className="text-green-600 font-bold">1도</span> 높여주었습니다.
          </p>
          <button 
            onClick={() => { setStep('main'); setRecipient(null); setSelectedTemp(null); setCustomMsg(""); }}
            className="w-full max-w-xs bg-white text-green-600 p-5 rounded-3xl font-black border-2 border-green-600 shadow-xl"
          >
            돌아가기
          </button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
